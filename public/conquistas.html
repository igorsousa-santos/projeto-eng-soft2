<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicHorizon - Conquistas</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 30px auto; padding: 0 15px; }
        nav { background: #eee; padding: 10px; margin-bottom: 20px; }
        nav a { margin-right: 15px; }
        table { border-collapse: collapse; width: 100%; margin: 10px 0; }
        th, td { border: 1px solid #aaa; padding: 6px 10px; text-align: left; }
        th { background: #ddd; }
        .empty { color: #666; font-style: italic; margin: 15px 0; }
    </style>
</head>
<body>
    <nav>
        <strong>MusicHorizon</strong> |
        <a href="dashboard.html">Perfil</a>
        <a href="conquistas.html">Conquistas</a>
        <a href="playlists.html">Playlists</a>
        <a href="index.html" style="float:right">Sair</a>
    </nav>

    <h1>Minhas Conquistas</h1>
    <p>GET /conquista/usuario/<span id="spanId"></span></p>

    <div id="empty" class="empty" hidden>Nenhuma conquista desbloqueada.</div>
    <table id="tabela" hidden>
        <thead><tr><th>Nome</th><th>Descricao</th><th>Pontos</th><th>Data</th></tr></thead>
        <tbody></tbody>
    </table>

    <script>
        const userId = sessionStorage.getItem('userId');
        if (!userId) window.location.href = 'index.html';
        document.getElementById('spanId').textContent = userId;

        async function carregar() {
            const res = await fetch('/conquista/usuario/' + userId);
            const data = await res.json();
            const conquistas = data.conquistas || [];
            if (conquistas.length === 0) {
                document.getElementById('empty').hidden = false;
                return;
            }
            const tbody = document.querySelector('#tabela tbody');
            conquistas.forEach(c => {
                const tr = document.createElement('tr');
                tr.innerHTML = '<td>' + c.nome + '</td><td>' + c.descricao + '</td><td>' + c.pontos_recompensa + '</td><td>' + new Date(c.data_conquistada).toLocaleDateString() + '</td>';
                tbody.appendChild(tr);
            });
            document.getElementById('tabela').hidden = false;
        }

        carregar();
    </script>
</body>
</html>
