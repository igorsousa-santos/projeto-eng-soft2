<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicHorizon - Dashboard</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 30px auto; padding: 0 15px; }
        nav { background: #eee; padding: 10px; margin-bottom: 20px; }
        nav a { margin-right: 15px; }
        input, button { padding: 6px 12px; margin: 3px 0; }
        input { box-sizing: border-box; }
        button { cursor: pointer; }
        .form-row { margin: 10px 0; }
        .form-row label { display: inline-block; width: 130px; font-weight: bold; }
        .msg { padding: 8px; margin: 10px 0; }
        .msg.error { background: #fdd; border: 1px solid #c00; }
        .msg.ok { background: #dfd; border: 1px solid #0a0; }
        .info { background: #f5f5f5; border: 1px solid #ccc; padding: 12px; margin: 10px 0; }
        h3 { margin-top: 25px; }
    </style>
</head>
<body>
    <nav>
        <strong>MusicHorizon</strong> |
        <a href="dashboard.html">Perfil</a>
        <a href="conquistas.html">Conquistas</a>
        <a href="playlists.html">Playlists</a>
        <a href="index.html" style="float:right">Sair</a>
    </nav>

    <h1>Dashboard</h1>
    <p>Bem-vindo, <strong id="spanLogin">...</strong></p>

    <h3>Seus Dados (GET /usuario/:id)</h3>
    <div id="userInfo" class="info">Carregando...</div>

    <h3>Editar Perfil (PUT /usuario/:id)</h3>
    <div class="form-row">
        <label>Login:</label>
        <input id="editLogin">
    </div>
    <div class="form-row">
        <label>Last.fm:</label>
        <input id="editLastfm">
    </div>
    <button onclick="salvar()">Salvar</button>
    <div id="editMsg" class="msg" hidden></div>

    <h3>Buscar Usuario por Last.fm (GET /usuario/lastfm/:username)</h3>
    <div class="form-row">
        <input id="searchLastfm" placeholder="lastfm_username" style="width:200px;display:inline">
        <button onclick="buscarLastfm()">Buscar</button>
    </div>
    <div id="searchResult" class="info" hidden></div>

    <h3>Excluir Conta (DELETE /usuario/:id)</h3>
    <button onclick="excluir()" style="color:red">Excluir minha conta</button>

    <script>
        const userId = sessionStorage.getItem('userId');
        if (!userId) window.location.href = 'index.html';

        document.getElementById('spanLogin').textContent = sessionStorage.getItem('userLogin') || userId;

        async function carregarPerfil() {
            const res = await fetch('/usuario/' + userId);
            const data = await res.json();
            if (data.usuario) {
                const u = data.usuario;
                document.getElementById('userInfo').textContent =
                    'ID: ' + u.id + '\nLogin: ' + u.login_usuario + '\nPontos: ' + u.pontos + '\nLast.fm: ' + (u.lastfm_username || '-') + '\nCadastro: ' + new Date(u.data_cadastro).toLocaleDateString();
                document.getElementById('userInfo').style.whiteSpace = 'pre-line';
                document.getElementById('editLogin').value = u.login_usuario || '';
                document.getElementById('editLastfm').value = u.lastfm_username || '';
            }
        }

        async function salvar() {
            const res = await fetch('/usuario/' + userId, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    loginUsuario: document.getElementById('editLogin').value,
                    lastfmUsername: document.getElementById('editLastfm').value || null,
                }),
            });
            const data = await res.json();
            const el = document.getElementById('editMsg');
            el.hidden = false;
            if (data.msgcode === 'SUCCESS') {
                el.className = 'msg ok';
                el.textContent = 'Salvo com sucesso.';
                sessionStorage.setItem('userLogin', document.getElementById('editLogin').value);
                document.getElementById('spanLogin').textContent = document.getElementById('editLogin').value;
                carregarPerfil();
            } else {
                el.className = 'msg error';
                el.textContent = 'Erro: ' + (data.message || 'falha');
            }
        }

        async function buscarLastfm() {
            const username = document.getElementById('searchLastfm').value.trim();
            if (!username) return;
            const res = await fetch('/usuario/lastfm/' + username);
            const data = await res.json();
            const el = document.getElementById('searchResult');
            el.hidden = false;
            el.style.whiteSpace = 'pre-line';
            if (data.usuario) {
                const u = data.usuario;
                el.textContent = 'ID: ' + u.id + '\nLogin: ' + u.login_usuario + '\nPontos: ' + u.pontos;
            } else {
                el.textContent = 'Usuario nao encontrado.';
            }
        }

        async function excluir() {
            if (!confirm('Tem certeza que deseja excluir sua conta?')) return;
            await fetch('/usuario/' + userId, { method: 'DELETE' });
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        carregarPerfil();
    </script>
</body>
</html>
